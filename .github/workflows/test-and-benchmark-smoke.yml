name: Test and Benchmark Smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov fastapi httpx redis prometheus-client pydantic pydantic-settings

      - name: Run deterministic routing tests
        run: python -m pytest tests/unit/test_llm_routing.py tests/unit/test_hybrid_retrieval.py tests/benchmark/test_llm_routing_benchmark.py -q

      - name: Run mock routing benchmark
        run: python benchmarks/llm_routing_benchmark.py --output-dir /tmp/llm-routing-benchmark --run-id ci
