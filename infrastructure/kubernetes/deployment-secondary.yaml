# Secondary region cluster (read-only for documents)
# inference-api proxies all /documents/* to primary cluster
apiVersion: v1
kind: Namespace
metadata:
  name: doc-intel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: doc-intel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
      - name: inference-api
        image: doc-intel/inference-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: redis-url
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: postgres-url
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: pinecone-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: gemini-api-key
        - name: LLM_ORCHESTRATOR_URL
          value: "http://llm-orchestrator:8002"
        - name: MINIO_ENDPOINT
          value: "minio:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: minio-access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: minio-secret-key
        - name: MINIO_BUCKET
          value: "documents"
        - name: MINIO_SECURE
          value: "false"
        # TODO: set this to the PRIMARY cluster inference-api base URL (LoadBalancer hostname)
        - name: DOCUMENTS_AUTHORITY_URL
          value: "https://api-us-east-1.doc-intel.example.com"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: doc-intel
spec:
  selector:
    app: inference-api
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
