# Primary region cluster (single-writer)
# Runs ingestion/workers
# inference-api uses local ingestion service
apiVersion: v1
kind: Namespace
metadata:
  name: doc-intel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: doc-intel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      containers:
      - name: inference-api
        image: doc-intel/inference-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: postgres-url
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: pinecone-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: gemini-api-key
        - name: LLM_ORCHESTRATOR_URL
          value: "http://llm-orchestrator:8002"
        - name: INGESTION_SERVICE_URL
          value: "http://ingestion:8001"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: doc-intel
spec:
  selector:
    app: inference-api
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: doc-intel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
      - name: ingestion
        image: doc-intel/ingestion:latest
        ports:
        - containerPort: 8001
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: doc-intel-secrets
              key: postgres-url
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: doc-intel
spec:
  selector:
    app: ingestion
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
