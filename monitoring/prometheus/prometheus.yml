global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: inference-api
    metrics_path: /metrics
    static_configs:
      - targets: ["inference-api:8000"]

  - job_name: ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion:8001"]

  - job_name: llm-orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["llm-orchestrator:8002"]

  - job_name: embedding
    static_configs:
      - targets: ["embedding:9102"]

  - job_name: layout-parser
    static_configs:
      - targets: ["layout-parser:9103"]
