[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=services
    --cov=benchmarks
    --cov=ml-pipeline
    --cov-report=html
    --cov-report=term-missing
markers =
    integration: Integration tests (requires services running)
    slow: Slow tests (>10s)
    gpu: Tests requiring GPU
    unit: Unit tests (fast, isolated, no external dependencies)
    benchmark: Benchmark and evaluation tests
    smoke: Smoke tests (quick validation with minimal data)
    reproducibility: Tests for reproducible results (same seed = same output)
    anyio: Async tests executed via AnyIO (default backend: asyncio)
    asyncio: (Deprecated) Prefer "anyio" marker
