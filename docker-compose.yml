# - async processing via Redis queue
# - GPU-based ML services
# - LLM orchestration (Mistral + external APIs)
# - observability via Prometheus + Grafana

services:
  # Infrastructure Services
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doc_intel}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # TODO: pin this to a MinIO RELEASE tag or digest in order to avoid latest
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # One-time init job that creates required S3 bucket for MLflow artifacts
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD 2>/dev/null; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/mlflow || true;
      mc anonymous set public local/mlflow || true;
      exit 0;
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    environment:
      BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI:-postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-doc_intel}}
      ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-s3://mlflow}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
    command: >
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-doc_intel}}
      --default-artifact-root s3://mlflow
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Entry point for documents - pushes jobs into Redis queue for async processing
  ingestion:
    ports:
      - "8001:8001"
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      POSTGRES_URL: ${COMPOSE_POSTGRES_URL:-postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-doc_intel}}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT}
      ENABLE_WORKERS: "false"
    volumes:
      - ./services:/app/services
      - ./tmp/uploads:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Background worker - consumes jobs from Redis queue (decouples ingestion from processing)
  worker:
    build:
      context: .
      dockerfile: services/worker.Dockerfile
    environment:
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PREFER_TEXT_PDF_EXTRACTION: ${PREFER_TEXT_PDF_EXTRACTION:-true}
      OCR_GPU: ${OCR_GPU:-false}
      POSTGRES_URL: ${COMPOSE_POSTGRES_URL:-postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-doc_intel}}
      ENABLE_WORKERS: "true"
    volumes:
      - ./services:/app/services
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ## GPU service - document understanding / embedding generation
  layout-parser:
    build:
      context: .
      dockerfile: services/layout-parser/Dockerfile
    environment:
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    volumes:
      - ./services:/app/services
      - ./models:/app/models

    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    environment:
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT}
      PINECONE_INDEX: ${PINECONE_INDEX:-doc-intelligence}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    volumes:
      - ./services:/app/services
      - ./models:/app/models

    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

  # Local LLM inference server (OpenAI-compatible API via vLLM)
  mistral:
    image: vllm/vllm-openai:latest
    ports:
      - "8003:8000"
    volumes:
      - ./models:/models
    command: >
      --model mistralai/Mistral-7B-Instruct
    

  # Routes requests between different LLM providers (local Mistral / external APIs)
  llm-orchestrator:
    build:
      context: .
      dockerfile: services/llm-orchestrator/Dockerfile
    environment:
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MISTRAL_API_URL: ${MISTRAL_API_URL:-http://mistral:8000}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    volumes:
      - ./services:/app/services
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
      mistral:
        condition: service_started

  # Main API exposed to clients - aggregates all services
  inference-api:
    build:
      context: .
      dockerfile: services/inference-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: ${COMPOSE_POSTGRES_URL:-postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-doc_intel}}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_ORCHESTRATOR_URL: ${LLM_ORCHESTRATOR_URL:-http://llm-orchestrator:8002}
      INGESTION_SERVICE_URL: ${INGESTION_SERVICE_URL:-http://ingestion:8001}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus

      # Dev auth defaults (override in .env in real deployments)
      REQUIRE_SECURE_CONFIG: ${REQUIRE_SECURE_CONFIG:-false}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_at_least_32_characters_long_12345678}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-dev_pepper_at_least_32_characters_long_12345678}
    volumes:
      - ./services:/app/services
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm-orchestrator:
        condition: service_started
      prometheus:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - inference-api

  monitoring:
    build:
      context: .
      dockerfile: services/monitoring/Dockerfile
    environment:
      POSTGRES_URL: ${COMPOSE_POSTGRES_URL:-postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-doc_intel}}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
    volumes:
      - ./services:/app/services
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: doc-intel-network